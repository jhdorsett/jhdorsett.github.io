<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Website</title>
  <!-- Optional: Add links to any custom stylesheets -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Welcome to My Website</h1>
  </header>

  <nav>
    <ul>
      <li><a href="/">Home</a></li>
      <li><a href="/about">About</a></li>
      <li><a href="/contact">Contact</a></li>
    </ul>
  </nav>

  <main>
    <section>
      <h2>About Me</h2>
      <p>This is the homepage of my website. You can add any content here.</p>
    </section>

    <section>
      <h2>Recent Posts</h2>
      <!-- Example of a Jekyll collection or list of posts -->
      <ul>
        {% for post in site.posts %}
          <li>
            <a href="{{ post.url }}">{{ post.title }}</a> - {{ post.date | date: "%b %d, %Y" }}
          </li>
        {% endfor %}
      </ul>
    </section>
  </main>

  <footer>
    <p>&copy; 2024 My Website</p>
  </footer>

</body>
</html>
